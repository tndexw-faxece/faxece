<style>
   body{
      background-color: rgb(1, 0, 24);
      text-align: center;
   }
   h1{
      color: rgb(0, 102, 255);
      text-shadow: 0 0 20px rgb(0, 102, 255);
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      font-size: 4rem;
      animation: LeftRightMove 5s ease-in-out infinite alternate;
   }
   .title{
      border: 10px double rgb(0, 102, 255);
      border-style: double dashed;
      box-shadow: 0 0 20px rgb(0, 102, 255);
      font-family: "kaiti", "SimSun", "SimHei", sans-serif;
   }
   b h1{
      color: rgb(147, 205, 255);
      font-family: 'Times New Roman', Times, serif;
      font-size: 2.5rem;
      animation: none;
      border: 3px dashed rgb(147, 205, 255);
      border-style: solid dashed;
   }
   h2{
      color: white;
      text-shadow: 0 0 20px white;
      transition: all 0.3s ease;
   }
   .h2-box{ 
      display: inline-block; 
      position: relative; 
      cursor: pointer; 
      margin: 10px 0; 
   } 
   .h2-box:hover h2{ transform: scale(1.15); 
      text-shadow: 0 0 30px white, 0 0 50px rgb(0, 102, 255); 
   }
   a.h2-box:hover h2{ 
      color: rgb(147, 205, 255); 
   } 
   img{
      border-radius: 50%;
      border: 4px solid white;
      width: 300px;
      height: 300px;
      object-fit: cover;
      box-shadow: 0 0 30px blue;
   }
   a{
      text-decoration: none;
   }
   @keyframes UpDownMove{
      0% {transform: translateY(7px);}
      100% {transform: translateY(-20px);}
   }
   @keyframes LeftRightMove{
      0% {transform: translateX(5px);}
      100% {transform: translateX(-5px);}
   }
   a h1{
      color: coral;
      text-shadow: 0 0 15px coral;
      animation: UpDownMove 1.5s ease-in-out infinite alternate;
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 2rem;
   }
   a h2{
      color: cadetblue;
      text-shadow: 0 0 15px cadetblue;
      font-family: Georgia, 'Times New Roman', Times, serif;
      animation: none;
   }
   .fake-alert{
      background-color: rgb(22, 21, 21);
      color:red;
      position: fixed;
      left:50%;
      top:50%;
      border: 2px solid red;
      box-shadow: 0 0 25px #ff3333;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 5px;
      transform: scale(0.1);
      opacity: 0;
      transition: all 0.5s;
   }
   .refix{
      
      background-color: rgb(22, 21, 21);
      color:rgb(255, 204, 0);
      position: fixed;
      left:50%;
      top:50%;
      border: 2px solid rgb(255, 204, 0);
      box-shadow: 0 0 25px #ffcc00;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 5px;
      transform: scale(0.1);
      opacity: 0;
      transition: all 0.5s;
   }
   .hidden{ visibility: hidden;}

   .tooltip{ 
      position: fixed;
      background: rgba(0, 102, 255, 0.9); 
      color: #fff; 
      padding: 6px 14px; 
      border-radius: 6px; 
      font-size: 14px; 
      white-space: nowrap; 
      opacity: 0; 
      visibility: hidden; 
      transition: opacity 0.2s; 
      pointer-events: none; 
      z-index: 1000; 
      box-shadow: 0 0 15px 
      rgba(0, 102, 255, 0.5); 
   } 
   .tooltip::after{ 
      content: '';
      position: absolute; 
      top: 100%; 
      left: 50%; 
      transform: translateX(-50%);
      border: 6px solid transparent; 
      border-top-color: rgba(0, 102, 255, 0.9); 
   } 
   .tooltip.show{ 
      opacity: 1; 
      visibility: visible; 
   } 
</style>

<script>
   function fackxece(){
      setTimeout(() => {
         let box = document.createElement("div");
         box.innerText = "⚠Error⚠"
         document.body.appendChild(box);
         box.className="fake-alert";

         box.offsetHeight;

         box.style.left = "50%";
         box.style.top = "60%";
         box.style.opacity = "1";
         box.style.transform = `scale(5)`;
      })
      var n = 100;
      for(var i=1;i<=n;i++){

         setTimeout(() => {
            let box = document.createElement("div");
            box.innerText = "⚠Error⚠"
            document.body.appendChild(box);
            box.className="fake-alert";

            box.offsetHeight;

            box.style.left = (Math.random() * 100) + "%";
            box.style.top = (Math.random() * 100) + "%";
            box.style.opacity = "1";
            box.style.transform = `scale(${Math.random() * 5 + 0.5})`;
         }, i*20+20);
         
      }
      setTimeout(() => {
         
         let nbox = document.createElement("div");
         nbox.innerText = "Fix"
         document.body.appendChild(nbox);
         nbox.className="refix";

         nbox.offsetHeight;

         nbox.style.opacity = "1";
         nbox.style.transform = `scale(5)`;
      }, 2020);
      setTimeout(() => {
         
         let nnbox = document.createElement("div");
         nnbox.innerText = "⚠CRITICAL ERROR!⚠"
         document.body.appendChild(nnbox);
         nnbox.className="fake-alert";

         nnbox.offsetHeight;

         nnbox.style.opacity = "1";
         nnbox.style.transform = `scale(7)`;
         setTimeout(() => {
            if (confirm("Do You Want Quit To Solve This Problem?")) {
               window.close();
               history.back();
            }
         },1000)
      },2420)
   }
   const tooltip = document.getElementById('tooltip'); 
   document.querySelectorAll('.h2-box').forEach(box => { box.addEventListener('mouseenter', () => { 
         tooltip.textContent = box.dataset.tooltip; 
         tooltip.classList.add('show'); 
      }); 
      
      box.addEventListener('mousemove', (e) => { 
         tooltip.style.left = e.clientX + 'px'; 
         tooltip.style.top = (e.clientY - 45) + 'px'; 
         tooltip.style.transform = 'translateX(-50%)'; 
      }); 
      
      box.addEventListener('mouseleave', () => { 
         tooltip.classList.remove('show'); 
      });
   }); 
</script>
