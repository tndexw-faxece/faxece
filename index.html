<script>
   function fackxece(){
      setTimeout(() => {
         let box = document.createElement("div");
         box.innerText = "⚠Error⚠"

         box.style.left = "50%";
         box.style.top = "60%";
         box.style.opacity = "1";
         box.style.transform = `scale(5)`;
      })
      var n = 100;
      for(var i=1;i<=n;i++){

         setTimeout(() => {
            let box = document.createElement("div");
            box.innerText = "⚠Error⚠"
            document.body.appendChild(box);
            box.className="fake-alert";

            box.offsetHeight;

            box.style.left = (Math.random() * 100) + "%";
            box.style.top = (Math.random() * 100) + "%";
            box.style.opacity = "1";
            box.style.transform = `scale(${Math.random() * 5 + 0.5})`;
         }, i*20+20);
         
      }
      setTimeout(() => {
         
         let nbox = document.createElement("div");
         nbox.innerText = "Fix"
         document.body.appendChild(nbox);
         nbox.className="refix";

         nbox.offsetHeight;

         nbox.style.opacity = "1";
